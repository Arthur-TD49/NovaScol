<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScol | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .checked { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-20 lg:w-72 bg-white border-r border-slate-200 flex flex-col p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-200">N</div>
                <span class="hidden lg:block text-2xl font-extrabold text-indigo-900 tracking-tighter">NovaScol</span>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="showTab('dash')" id="btn-dash" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl bg-indigo-50 text-indigo-600 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="hidden lg:block text-sm">Vue d'ensemble</span>
                </button>
                <button onclick="showTab('planning')" id="btn-planning" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    <span class="hidden lg:block text-sm">Emploi du temps</span>
                </button>
                <button onclick="showTab('notes')" id="btn-notes" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                    <span class="hidden lg:block text-sm">Notes détaillées</span>
                </button>
            </nav>

            <div class="mt-auto p-4 bg-slate-50 rounded-3xl hidden lg:flex items-center gap-3 border border-slate-100 shadow-sm">
                <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold">LB</div>
                <div>
                    <p class="text-sm font-bold">Lucas Bernard</p>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Élève • Term 2</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 lg:p-10">
            
            <section id="tab-dash" class="tab-content active">
                <h1 class="text-3xl font-black mb-8 text-slate-900 italic">Tableau de bord</h1>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-2">📝 Devoirs récents</h3>
                        <div id="todoContainer" class="space-y-4"></div>
                        <div class="mt-6 flex gap-2">
                            <input id="todoInput" type="text" placeholder="Ajouter un devoir..." class="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <button onclick="addTodo()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold text-sm">+</button>
                        </div>
                    </div>
                    <div class="bg-indigo-900 p-8 rounded-[2.5rem] text-white flex flex-col justify-center text-center shadow-xl shadow-indigo-100">
                        <p class="text-indigo-300 font-bold text-xs uppercase tracking-widest mb-2">Moyenne</p>
                        <span id="averageDisplay" class="text-6xl font-black italic">--</span>
                        <p class="mt-4 text-xs opacity-60 italic">Données sauvegardées localement</p>
                    </div>
                </div>
            </section>

            <section id="tab-planning" class="tab-content">
                <h1 class="text-3xl font-black mb-8 text-slate-900 italic">Emploi du temps</h1>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 text-sm uppercase tracking-widest">
                                <th class="pb-6 px-4">Heure</th>
                                <th class="pb-6 px-4">Lundi</th>
                                <th class="pb-6 px-4">Mardi</th>
                                <th class="pb-6 px-4">Mercredi</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm font-semibold text-slate-700">
                            <tr class="border-t border-slate-50">
                                <td class="py-6 px-4 text-indigo-600">08:00</td>
                                <td class="py-6 px-4"><div class="bg-blue-50 p-3 rounded-xl border-l-4 border-blue-500">Maths <br><span class="text-[10px] opacity-50">B201</span></div></td>
                                <td class="py-6 px-4"><div class="bg-emerald-50 p-3 rounded-xl border-l-4 border-emerald-500">SVT <br><span class="text-[10px] opacity-50">Labo 1</span></div></td>
                                <td class="py-6 px-4"><div class="bg-purple-50 p-3 rounded-xl border-l-4 border-purple-500">Histoire <br><span class="text-[10px] opacity-50">A12</span></div></td>
                            </tr>
                            <tr class="border-t border-slate-50">
                                <td class="py-6 px-4 text-indigo-600">10:00</td>
                                <td class="py-6 px-4">---</td>
                                <td class="py-6 px-4"><div class="bg-amber-50 p-3 rounded-xl border-l-4 border-amber-500">Anglais <br><span class="text-[10px] opacity-50">C04</span></div></td>
                                <td class="py-6 px-4"><div class="bg-rose-50 p-3 rounded-xl border-l-4 border-rose-500">Philo <br><span class="text-[10px] opacity-50">Amphi</span></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="tab-notes" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-black text-slate-900 italic">Notes détaillées</h1>
                    <button onclick="addGrade()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:scale-105 transition">+ Nouvelle Note</button>
                </div>
                <div id="gradesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </section>

        </main>
    </div>

    <script>
        // --- GESTION DES ONGLETS ---
        function showTab(tabName) {
            // Masquer tout
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-50', 'text-indigo-600');
                btn.classList.add('text-slate-400');
            });

            // Afficher le bon
            document.getElementById('tab-' + tabName).classList.add('active');
            const activeBtn = document.getElementById('btn-' + tabName);
            activeBtn.classList.add('bg-indigo-50', 'text-indigo-600');
            activeBtn.classList.remove('text-slate-400');
        }

        // --- DONNÉES ET LOGIQUE ---
        let state = JSON.parse(localStorage.getItem('novascol_v2')) || {
            grades: [
                { subject: 'Mathématiques', value: 16, coeff: 2, date: '01/03' },
                { subject: 'Philosophie', value: 12.5, coeff: 1, date: '03/03' }
            ],
            todos: [
                { text: 'DM de Physique', done: false }
            ]
        };

        function saveData() {
            localStorage.setItem('novascol_v2', JSON.stringify(state));
            render();
        }

        function render() {
            // Rendu Devoirs (Dashboard)
            const todoDiv = document.getElementById('todoContainer');
            todoDiv.innerHTML = state.todos.map((t, i) => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})" class="w-5 h-5 rounded-lg accent-indigo-600">
                        <span class="${t.done ? 'checked text-slate-400' : 'font-bold text-slate-700'}">${t.text}</span>
                    </div>
                    <button onclick="deleteTodo(${i})" class="text-slate-300 hover:text-red-500">✕</button>
                </div>
            `).join('') || '<p class="text-center text-slate-400 py-4">Aucun devoir en attente ! 🎉</p>';

            // Rendu Notes (Section Notes)
            const gradesDiv = document.getElementById('gradesContainer');
            gradesDiv.innerHTML = state.grades.map((g, i) => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                    <div>
                        <p class="text-xs font-black uppercase tracking-tighter text-slate-400 mb-1">${g.date} • Coeff ${g.coeff}</p>
                        <h4 class="font-bold text-lg text-slate-800">${g.subject}</h4>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="text-2xl font-black text-indigo-600">${g.value.toFixed(1)}<span class="text-xs text-slate-300">/20</span></span>
                        <button onclick="deleteGrade(${i})" class="opacity-0 group-hover:opacity-100 text-red-400 transition">✕</button>
                    </div>
                </div>
            `).join('');

            // Calcul Moyenne
            if(state.grades.length > 0) {
                let totalPoints = state.grades.reduce((acc, curr) => acc + (curr.value * curr.coeff), 0);
                let totalCoeffs = state.grades.reduce((acc, curr) => acc + curr.coeff, 0);
                document.getElementById('averageDisplay').innerText = (totalPoints / totalCoeffs).toFixed(2);
            } else {
                document.getElementById('averageDisplay').innerText = "--";
            }
        }

        // --- ACTIONS ---
        function addTodo() {
            const input = document.getElementById('todoInput');
            if(input.value.trim()) {
                state.todos.push({ text: input.value, done: false });
                input.value = "";
                saveData();
            }
        }
        function toggleTodo(i) { state.todos[i].done = !state.todos[i].done; saveData(); }
        function deleteTodo(i) { state.todos.splice(i, 1); saveData(); }

        function addGrade() {
            const subject = prompt("Matière ?");
            const val = parseFloat(prompt("Note /20 ?"));
            const coeff = parseInt(prompt("Coefficient ?") || "1");
            if(subject && !isNaN(val)) {
                state.grades.push({ subject, value: val, coeff, date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) });
                saveData();
            }
        }
        function deleteGrade(i) { state.grades.splice(i, 1); saveData(); }

        render();
    </script>
</body>
</html>
