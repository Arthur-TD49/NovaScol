<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScol | Dashboard Interactif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .checked { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="bg-[#F0F2F5] text-slate-800">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-20 lg:w-72 bg-white border-r border-slate-200 flex flex-col p-6">
            <div class="flex items-center gap-3 mb-12 px-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">N</div>
                <span class="hidden lg:block text-2xl font-extrabold text-indigo-900 tracking-tight">NovaScol</span>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="showSection('dash')" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-indigo-50 text-indigo-600 font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="hidden lg:block">Tableau de bord</span>
                </button>
            </nav>

            <div class="mt-auto p-4 bg-slate-50 rounded-3xl hidden lg:flex items-center gap-3 border border-slate-100">
                <div class="w-10 h-10 rounded-full bg-indigo-500 shadow-sm flex items-center justify-center text-white font-bold">LB</div>
                <div>
                    <p class="text-sm font-bold">Lucas Bernard</p>
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Terminale 2</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 lg:p-12">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Dashboard</h1>
                    <p class="text-slate-500 font-medium" id="currentDate"></p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-8 space-y-8">
                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black">Mes dernières notes</h2>
                            <button onclick="addGrade()" class="text-sm bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-indigo-700">+ Ajouter</button>
                        </div>
                        <div id="gradesContainer" class="space-y-4 text-sm font-medium">
                            </div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-8">
                    <div class="bg-indigo-900 p-8 rounded-[3rem] text-white shadow-2xl shadow-indigo-300">
                        <p class="text-indigo-300 font-bold uppercase text-xs tracking-widest mb-2">Moyenne Générale</p>
                        <div class="flex items-baseline gap-2">
                            <span id="averageDisplay" class="text-6xl font-black italic">--</span>
                            <span class="text-indigo-400 font-bold">/20</span>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                        <h3 class="text-lg font-black mb-6">À faire</h3>
                        <div id="todoContainer" class="space-y-4">
                            </div>
                        <div class="mt-6 flex gap-2">
                            <input id="todoInput" type="text" placeholder="Nouveau devoir..." class="flex-1 bg-slate-50 border-none rounded-xl px-4 text-sm focus:ring-2 focus:ring-indigo-500">
                            <button onclick="addTodo()" class="bg-indigo-600 text-white p-3 rounded-xl hover:shadow-lg transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- LOGIQUE DE L'APPLICATION ---
        
        let state = JSON.parse(localStorage.getItem('novascol_data')) || {
            grades: [
                { subject: 'Maths', value: 16, coeff: 2 },
                { subject: 'Français', value: 14, coeff: 1 }
            ],
            todos: [
                { text: 'Réviser le chapitre 1', done: false }
            ]
        };

        function saveData() {
            localStorage.setItem('novascol_data', JSON.stringify(state));
            render();
        }

        function render() {
            // Affichage de la date
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

            // Rendu des Notes
            const gradesDiv = document.getElementById('gradesContainer');
            gradesDiv.innerHTML = state.grades.map((g, i) => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <span>${g.subject}</span>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-indigo-600">${g.value}/20</span>
                        <button onclick="deleteGrade(${i})" class="text-red-400 text-xs">Suppr.</button>
                    </div>
                </div>
            `).join('');

            // Calcul de la moyenne
            if(state.grades.length > 0) {
                let totalPoints = state.grades.reduce((acc, curr) => acc + (curr.value * curr.coeff), 0);
                let totalCoeffs = state.grades.reduce((acc, curr) => acc + curr.coeff, 0);
                document.getElementById('averageDisplay').innerText = (totalPoints / totalCoeffs).toFixed(2);
            }

            // Rendu des Devoirs
            const todoDiv = document.getElementById('todoContainer');
            todoDiv.innerHTML = state.todos.map((t, i) => `
                <div class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl transition cursor-pointer">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})" class="w-5 h-5 rounded-md accent-indigo-600">
                    <span class="${t.done ? 'checked text-slate-400' : 'font-medium'}">${t.text}</span>
                </div>
            `).join('');
        }

        // --- ACTIONS ---

        function addGrade() {
            const subject = prompt("Matière ?");
            const value = parseFloat(prompt("Note (sur 20) ?"));
            if(subject && !isNaN(value)) {
                state.grades.push({ subject, value, coeff: 1 });
                saveData();
            }
        }

        function deleteGrade(index) {
            state.grades.splice(index, 1);
            saveData();
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(input.value.trim() !== "") {
                state.todos.push({ text: input.value, done: false });
                input.value = "";
                saveData();
            }
        }

        function toggleTodo(index) {
            state.todos[index].done = !state.todos[index].done;
            saveData();
        }

        // Lancement initial
        render();
    </script>
</body>
</html>
