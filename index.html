<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScol | Dashboard Perso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <div id="welcome-modal" class="modal">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full mx-4 border border-slate-100">
            <h2 class="text-3xl font-black text-indigo-900 mb-2 italic">Bienvenue !</h2>
            <p class="text-slate-500 mb-6">Configure ton espace NovaScol.</p>
            <div class="space-y-4">
                <input id="user-name-input" type="text" placeholder="Ton prénom (ex: Lucas)" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="user-class-input" type="text" placeholder="Ta classe (ex: Terminale 2)" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="setupUser()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 transition">C'est parti !</button>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-20 lg:w-72 bg-white border-r border-slate-200 flex flex-col p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">N</div>
                <span class="hidden lg:block text-2xl font-extrabold text-indigo-900 tracking-tighter">NovaScol</span>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="showTab('dash')" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl bg-indigo-50 text-indigo-600 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    <span class="hidden lg:block">Accueil</span>
                </button>
                <button onclick="showTab('planning')" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    <span class="hidden lg:block text-sm">Emploi du temps</span>
                </button>
                <button onclick="showTab('todo')" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M2 12h20"/><path d="m4.5 16.5 4-4-4-4"/><path d="m19.5 7.5-4 4 4 4"/></svg>
                    <span class="hidden lg:block text-sm">To-Do List</span>
                </button>
                <button onclick="showTab('notes')" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>
                    <span class="hidden lg:block text-sm">Notes</span>
                </button>
            </nav>

            <div class="mt-auto p-4 bg-slate-50 rounded-3xl hidden lg:flex items-center gap-3 border border-slate-100">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-xs uppercase">--</div>
                <div class="overflow-hidden">
                    <p id="user-name" class="text-sm font-bold truncate italic">Utilisateur</p>
                    <p id="user-class" class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Classe Inconnue</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 lg:p-10">
            
            <section id="tab-dash" class="tab-content active">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight italic">Salut, <span id="hello-name" class="text-indigo-600">Toi</span> !</h1>
                        <p class="text-slate-500 font-medium mt-1">Tu as <span id="pending-count" class="font-bold text-indigo-500">0</span> devoirs en attente.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 relative overflow-hidden">
                            <h3 class="text-xl font-black mb-4 flex items-center gap-2">📍 Prochain Cours</h3>
                            <div class="flex justify-between items-center p-6 bg-indigo-50 rounded-[2rem] border border-indigo-100">
                                <div>
                                    <h4 class="text-2xl font-black text-indigo-900 uppercase italic">Physique-Chimie</h4>
                                    <p class="text-indigo-400 font-bold">14:00 • Salle Labo 2</p>
                                </div>
                                <div class="text-indigo-600 font-black text-2xl px-4 py-2 bg-white rounded-2xl shadow-sm">14:00</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-indigo-900 p-8 rounded-[3rem] text-white flex flex-col justify-center text-center shadow-xl shadow-indigo-100">
                        <p class="text-indigo-300 font-bold text-xs uppercase tracking-widest mb-2">Moyenne Générale</p>
                        <span id="averageDisplay" class="text-7xl font-black italic">--</span>
                    </div>
                </div>
            </section>

            <section id="tab-todo" class="tab-content">
                <h1 class="text-3xl font-black mb-8 italic">Ma To-Do List</h1>
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                    <div class="flex gap-4 mb-8">
                        <input id="todoInputPage" type="text" placeholder="Ajouter une tâche importante..." class="flex-1 bg-slate-50 rounded-2xl px-6 py-4 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button onclick="addTodo('todoInputPage')" class="bg-indigo-600 text-white px-8 rounded-2xl font-black hover:bg-indigo-700 transition">AJOUTER</button>
                    </div>
                    <div id="todoContainerPage" class="space-y-4"></div>
                </div>
            </section>

            <section id="tab-planning" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-black italic">Emploi du temps</h1>
                    <p class="text-xs text-slate-400 font-bold italic uppercase tracking-widest">Clique sur un cours pour le modifier</p>
                </div>
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 overflow-x-auto">
                    <div id="planning-grid" class="grid grid-cols-6 gap-4 min-w-[800px]">
                        </div>
                </div>
            </section>

            <section id="tab-notes" class="tab-content">
                <div class="flex justify-between items-center mb-8 text-slate-900">
                    <h1 class="text-3xl font-black italic">Notes</h1>
                    <button onclick="addGrade()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition">+ AJOUTER UNE NOTE</button>
                </div>
                <div id="gradesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

        </main>
    </div>

    <script>
        // --- LOGIQUE D'ÉTAT ---
        let state = JSON.parse(localStorage.getItem('novascol_v3')) || {
            user: { name: '', class: '' },
            grades: [],
            todos: [],
            planning: [
                { day: 'Lun', time: '08h', subject: 'Maths', room: 'B201', color: 'bg-blue-50 border-blue-500' },
                { day: 'Mar', time: '10h', subject: 'Anglais', room: 'C04', color: 'bg-emerald-50 border-emerald-500' }
            ]
        };

        function saveData() {
            localStorage.setItem('novascol_v3', JSON.stringify(state));
            render();
        }

        // --- PREMIÈRE OUVERTURE ---
        window.onload = () => {
            if (!state.user.name) {
                document.getElementById('welcome-modal').classList.add('active');
            } else {
                render();
            }
        };

        function setupUser() {
            const name = document.getElementById('user-name-input').value;
            const className = document.getElementById('user-class-input').value;
            if (name && className) {
                state.user = { name, class: className };
                document.getElementById('welcome-modal').classList.remove('active');
                saveData();
            }
        }

        // --- NAVIGATION ---
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-indigo-50', 'text-indigo-600');
                b.classList.add('text-slate-400');
            });
            event.currentTarget.classList.add('bg-indigo-50', 'text-indigo-600');
        }

        // --- ACTIONS ---
        function addTodo(inputId) {
            const input = document.getElementById(inputId);
            if (input.value.trim()) {
                state.todos.push({ text: input.value, done: false });
                input.value = "";
                saveData();
            }
        }

        function editPlanning(index) {
            const newSub = prompt("Matière ?", state.planning[index].subject);
            const newRoom = prompt("Salle ?", state.planning[index].room);
            if (newSub) {
                state.planning[index].subject = newSub;
                state.planning[index].room = newRoom;
                saveData();
            }
        }

        function addGrade() {
            const sub = prompt("Matière ?");
            const val = parseFloat(prompt("Note /20 ?"));
            if (sub && !isNaN(val)) {
                state.grades.push({ subject: sub, value: val, coeff: 1, date: '06/03' });
                saveData();
            }
        }

        // --- RENDU ---
        function render() {
            // Infos utilisateur
            document.getElementById('user-name').innerText = state.user.name;
            document.getElementById('hello-name').innerText = state.user.name;
            document.getElementById('user-class').innerText = state.user.class;
            document.getElementById('user-avatar').innerText = state.user.name.substring(0, 2);

            // To-Do
            const todoCont = document.getElementById('todoContainerPage');
            todoCont.innerHTML = state.todos.map((t, i) => `
                <div class="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-transparent hover:border-slate-200 transition">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="state.todos[${i}].done = !state.todos[${i}].done; saveData();" class="w-6 h-6 accent-indigo-600">
                        <span class="${t.done ? 'line-through text-slate-400 font-medium' : 'font-black text-slate-700'}">${t.text}</span>
                    </div>
                    <button onclick="state.todos.splice(${i}, 1); saveData();" class="text-slate-300 hover:text-red-500">✕</button>
                </div>
            `).join('');
            document.getElementById('pending-count').innerText = state.todos.filter(t => !t.done).length;

            // Planning Modifiable
            const planGrid = document.getElementById('planning-grid');
            planGrid.innerHTML = state.planning.map((p, i) => `
                <div onclick="editPlanning(${i})" class="cursor-pointer p-4 rounded-3xl border-l-4 shadow-sm transition hover:scale-105 ${p.color}">
                    <p class="text-[10px] font-black uppercase opacity-40">${p.day} • ${p.time}</p>
                    <p class="font-black text-slate-800">${p.subject}</p>
                    <p class="text-xs opacity-60">${p.room}</p>
                </div>
            `).join('') + `
                <button onclick="state.planning.push({day:'Lun', time:'08h', subject:'Nouveau', room:'Salle', color:'bg-slate-50 border-slate-300'}); saveData();" class="border-2 border-dashed border-slate-200 rounded-3xl flex items-center justify-center text-slate-300 hover:text-indigo-400 hover:border-indigo-200 transition">+</button>
            `;

            // Notes & Moyenne
            const gradesCont = document.getElementById('gradesContainer');
            gradesCont.innerHTML = state.grades.map((g, i) => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                    <div>
                        <p class="text-[10px] font-black text-slate-300 uppercase italic mb-1">${g.date}</p>
                        <h4 class="font-bold text-slate-800">${g.subject}</h4>
                    </div>
                    <span class="text-2xl font-black text-indigo-600 italic">${g.value}</span>
                </div>
            `).join('');

            if(state.grades.length > 0) {
                let avg = state.grades.reduce((a, b) => a + b.value, 0) / state.grades.length;
                document.getElementById('averageDisplay').innerText = avg.toFixed(2);
            }
        }
    </script>
</body>
</html>
